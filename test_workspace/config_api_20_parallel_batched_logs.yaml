name: gsm8k_rup_api_20_parallel_batched_logs

model:
  backend: api
  base_url: https://uni-api.cstcloud.cn/v1
  model: deepseek-v3.2-gw
  concurrency: 4
  max_retries: 3

dataset:
  task_file: tasks/gsm8k_rup.py
  source: data/GSM8K_RUP.csv
  limit: 20
  n_samples: 1

generation:
  max_tokens: 256
  temperature: 0.0
  stop: null
  seed: 0

output:
  on_truncate: accept
  flush_every: 1

thresholds:
  truncated: 0.2
  extract_failed: 0.2
  error: 0.2

runtime:
  batch_size: 5

logging:
  console: true
  progress_every: 5
  progress_interval_sec: 30
  error_preview_chars: 240
  sample_bad_records: 20
